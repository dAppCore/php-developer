name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    container:
      image: lthn/build:php-\${{ matrix.php }}

    strategy:
      fail-fast: true
      matrix:
        php: ["8.3", "8.4"]

    steps:
      - uses: actions/checkout@v4

      - name: Clone sister packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Cloning php-framework into ../php-framework"
          git clone --depth 1 \
            "https://x-access-token:${GITHUB_TOKEN}@forge.lthn.ai/core/php-framework.git" \
            ../php-framework
          echo "Cloning php-admin into ../php-admin"
          git clone --depth 1 \
            "https://x-access-token:${GITHUB_TOKEN}@forge.lthn.ai/core/php-admin.git" \
            ../php-admin
          ls -la ../php-framework/composer.json ../php-admin/composer.json

      - name: Configure path repositories
        run: |
          composer config repositories.core path ../php-framework --no-interaction
          composer config repositories.admin path ../php-admin --no-interaction

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Run Pint
        run: |
          if [ -f vendor/bin/pint ]; then
            vendor/bin/pint --test
          else
            echo "Pint not installed, skipping"
          fi

      - name: Run tests
        run: |
          if [ -f vendor/bin/pest ]; then
            vendor/bin/pest --ci --coverage
          elif [ -f vendor/bin/phpunit ]; then
            vendor/bin/phpunit --coverage-text
          else
            echo "No test runner found, skipping"
          fi
